<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Great Auto Parts - order form</h1>

        <div class="form">
            <form>
                <label for="first-name">First Name:</label>
                <input type="text" name="first name" id="first-name" placeholder="Enter your first name">

                <label for="last-name">Last Name:</label>
                <input type="text" name="last-name" id="last-name" placeholder="Enter your last name">

                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="Enter your email">

                <label for="phone-number">Phone Number:</label>
                <input type="tel" name="phone number" id="phone-number" placeholder="Enter your phone number">

                <label for="make">Make:</label>
                <input type="text" name="make" id="make" placeholder="Make">

                <label for="model">Model:</label>
                <input type="text" name="model" id="model" placeholder="Modle">

                <label for="year">Year:</label>
                <input type="number" name="year" id="year" placeholder="Year">

                <label for="date">Date:</label>
                <input type="date" name="date" id="date">

                <label for="sparePart">Spare Parts:</label>
                <input type="text" name="spare parts" id="spare parts"
                    placeholder="Enter the spare parts you need">

                <label for="quantity">Quantity:</label>
                <input type="number" name="quantity" id="quantity" placeholder="Enter the quantity of spare parts you need">

                <label for="comments">Comment:</label>
                <textarea name="comments" id="comments" rows="4" cols="50" placeholder="Enter your comment"></textarea>

                <input id="submit" type="submit" value="Submit">
            </form>
        </div>
    </div>




</body>

</html>
