<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Abdulaziz Almutairi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <nav>
            <a href="../index.html" class="logo"><img src="../img/azizlogo.png" alt="logo"></a>
            <ul class="nav-links" id="navLinks">
                <li><a href="../index.html">Home</a></li>
                <li><a href="cv.html">CV</a></li>
                <li><a href="labs.html">Labs</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </nav>
    </header>

    <main class="contact-container">
        <div class="form-header">
            <h1 class="section-title">Get in <span class="gradient-text">Touch</span></h1>
        </div>

        <div class="contact-grid">
            <div class="contact-info">
                <a href="mailto:aalmutairi0865@stu.kau.edu.sa" class="info-card">
                    <div class="icon-box">
                        <i class="bi bi-envelope-fill"></i>
                    </div>
                    <div class="info-content">
                        <h3>Email Me</h3>
                        <p>aalmutairi0865@stu.kau.edu.sa
                        </p>
                    </div>
                </a>


                <div class="social-connect">
                    <h2>Find me on</h2>
                    <div class="social-pills">
                        <a href="https://github.com/iazizlo" target="_blank" class="social-pill">
                            <i class="bi bi-github"></i> GitHub
                        </a>
                        <a href="https://www.linkedin.com/in/abdulaziz-almutairi-9bb08a270/" target="_blank"
                            class="social-pill">
                            <i class="bi bi-linkedin"></i> LinkedIn
                        </a>
                    </div>
                </div>
            </div>
            <div class="contact-form">
                <form id="contactForm" action="https://api.web3forms.com/submit" method="POST">
                    <input type="hidden" name="access_key" value="62bc63ea-374b-4c6d-ad93-13f42ecb58fa">
                    <input type="hidden" name="subject" value="New message from portfolio contact form">
                    <input type="hidden" name="redirect" value="false">

                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="email@example.com" required>
                    </div>



                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" rows="6" placeholder="How can I help you?"
                            required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
                        <span id="btnText">Send Message</span>
                        <i class="bi bi-send" id="btnIcon"></i>
                        <span id="btnSpinner" class="spinner"></span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <div id="toast" role="alert" aria-live="polite">
        <i id="toastIcon" class="bi"></i>
        <span id="toastMsg"></span>
    </div>

    <footer>
        <p>&copy; 2026 Abdulaziz Almutairi | CPIT-405 portfolio</p>
    </footer>

</body>

</html>
